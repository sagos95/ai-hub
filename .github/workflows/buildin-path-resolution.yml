name: buildin path resolution

# Гейт: командные .md плагина buildin должны резолвить путь к скриптам во всех
# сценариях потребления (standalone / subtree-overlay / marketplace-install).
# Тест печатает матрицу по кейсам и валит job ненулевым exit.

on:
  pull_request:
    paths:
      - 'integrations/buildin/commands/**'
      - 'integrations/buildin/scripts/**'
      - 'tests/buildin-path-resolution.sh'
      - '.github/workflows/buildin-path-resolution.yml'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  path-resolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run buildin path-resolution gate
        run: bash tests/buildin-path-resolution.sh
