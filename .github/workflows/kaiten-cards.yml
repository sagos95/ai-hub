name: kaiten-cards tests

# Гейт семантики команд kaiten-cards.sh (стаб-тесты API-вызовов без сети).
# Пока покрыт `assign`: команда обязана делать пользователя ОТВЕТСТВЕННЫМ (POST членство +
# PATCH type 2), а не оставлять участником — регрессия, которую легко не заметить (API 200 OK).

on:
  pull_request:
    paths:
      - 'integrations/kaiten/scripts/**'
      - 'tests/kaiten-cards-assign.sh'
      - '.github/workflows/kaiten-cards.yml'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  kaiten-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run kaiten-cards assign gate
        run: bash tests/kaiten-cards-assign.sh
